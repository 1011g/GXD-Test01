<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GXD 测试系统</title>
    <style>
        /* ======================================================
           style.css — GXD 测试系统 全局样式
           ====================================================== */

        /* ---------- CSS 变量（统一管理主题色） ---------- */
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #22c55e;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --white: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 1px 3px rgba(0,0,0,.08);
            --radius: 8px;
            --sidebar-width: 220px;
            --topbar-height: 56px;
        }

        /* ---------- 基础重置 ---------- */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 15px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ---------- 顶部导航栏 ---------- */
        .topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--topbar-height);
            background: var(--white);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--text);
            padding: 4px 8px;
            border-radius: 4px;
        }
        .sidebar-toggle:hover {
            background: #f1f5f9;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-badge {
            font-size: 14px;
            color: var(--text-secondary);
            background: #f1f5f9;
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* ---------- 整体布局（侧边栏 + 主体） ---------- */
        .layout {
            display: flex;
            margin-top: var(--topbar-height);
            min-height: calc(100vh - var(--topbar-height) - 50px);
        }

        /* ---------- 侧边栏 ---------- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--white);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: var(--topbar-height);
            bottom: 0;
            left: 0;
            z-index: 50;
            transition: transform 0.25s ease;
        }

        .nav-list {
            list-style: none;
            padding: 12px 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 14px;
            transition: background 0.15s, color 0.15s;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: #f1f5f9;
            color: var(--text);
        }

        .nav-item.active {
            background: #eef2ff;
            color: var(--primary);
            border-left-color: var(--primary);
            font-weight: 600;
        }

        .nav-icon {
            font-size: 18px;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ---------- 主体内容 ---------- */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 24px;
            min-width: 0;
        }

        /* ---------- 工具栏 ---------- */
        .toolbar {
            margin-bottom: 20px;
        }

        .toolbar-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79,70,229,.15);
        }

        .filter-group select {
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            background: var(--white);
            outline: none;
            cursor: pointer;
        }

        /* ---------- 通用按钮 ---------- */
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--white);
        }
        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: var(--text);
        }
        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .btn-danger {
            background: var(--danger);
            color: var(--white);
        }
        .btn-danger:hover {
            background: var(--danger-hover);
        }

        /* ---------- 列表为空时的占位 ---------- */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            font-size: 16px;
        }

        /* ---------- 用例卡片列表 ---------- */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
            cursor: pointer;
            transition: box-shadow 0.15s, transform 0.1s;
        }

        .card:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
            transform: translateY(-1px);
        }

        .card-priority-bar {
            width: 4px;
            border-radius: 2px;
            flex-shrink: 0;
            align-self: stretch;
        }
        .card-priority-bar.p0 { background: #ef4444; }
        .card-priority-bar.p1 { background: #f97316; }
        .card-priority-bar.p2 { background: #eab308; }
        .card-priority-bar.p3 { background: #22c55e; }

        .card-body {
            flex: 1;
            min-width: 0;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-tag.待执行 { background: #f1f5f9; color: #64748b; }
        .status-tag.执行中 { background: #fef3c7; color: #b45309; }
        .status-tag.通过   { background: #dcfce7; color: #16a34a; }
        .status-tag.失败   { background: #fee2e2; color: #dc2626; }

        .priority-tag {
            font-size: 12px;
            font-weight: 500;
        }

        /* ---------- 分页控件 ---------- */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
            padding: 12px 0;
        }

        .page-btn {
            padding: 6px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--white);
            cursor: pointer;
            font-size: 13px;
            transition: background 0.15s;
        }
        .page-btn:hover:not(:disabled) {
            background: #f1f5f9;
        }
        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .page-info {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ---------- 模态弹窗 ---------- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.4);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--white);
            border-radius: 12px;
            width: 100%;
            max-width: 560px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,.15);
            animation: modalIn 0.2s ease;
        }

        .modal-sm {
            max-width: 400px;
        }

        .modal-detail {
            max-width: 640px;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(.95) translateY(10px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px 12px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h2 {
            font-size: 17px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 0 4px;
            line-height: 1;
        }
        .modal-close:hover {
            color: var(--text);
        }

        .modal-body {
            padding: 20px 24px;
            overflow-y: auto;
            flex: 1;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 12px 24px 18px;
            border-top: 1px solid var(--border);
        }

        /* ---------- 表单控件 ---------- */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text);
        }

        .required {
            color: var(--danger);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79,70,229,.12);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .error-msg {
            display: none;
            font-size: 12px;
            color: var(--danger);
            margin-top: 4px;
        }

        .form-group.invalid .error-msg {
            display: block;
        }
        .form-group.invalid input,
        .form-group.invalid textarea,
        .form-group.invalid select {
            border-color: var(--danger);
        }

        .form-row {
            display: flex;
            gap: 16px;
        }
        .form-row .form-group {
            flex: 1;
        }

        /* ---------- 详情弹窗内容 ---------- */
        .detail-field {
            margin-bottom: 16px;
        }

        .detail-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 14px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* ---------- Toast 提示 ---------- */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--text);
            color: var(--white);
            padding: 10px 24px;
            border-radius: var(--radius);
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.25s, transform 0.25s;
            pointer-events: none;
            z-index: 300;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ---------- 页脚 ---------- */
        .footer {
            margin-left: var(--sidebar-width);
            padding: 16px 24px;
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            background: var(--white);
        }

        /* ---------- 响应式适配（窄屏） ---------- */
        @media (max-width: 768px) {
            .sidebar-toggle {
                display: inline-block;
            }
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content,
            .footer {
                margin-left: 0;
            }
            .main-content {
                padding: 16px;
            }
            .toolbar-row {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box {
                min-width: 0;
            }
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            .modal {
                max-width: 100%;
                border-radius: 8px;
            }
            .modal-header,
            .modal-body,
            .modal-footer {
                padding-left: 16px;
                padding-right: 16px;
            }
            .card {
                padding: 12px 14px;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 15px;
            }
            .user-badge {
                font-size: 12px;
                padding: 3px 10px;
            }
            .btn {
                font-size: 13px;
                padding: 7px 14px;
            }
        }
    
        /* ========== 登录页面样式 ========== */
        .login-page {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 9999;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-page.hidden { display: none; }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
        }
        .login-card h1 { text-align: center; font-size: 24px; margin-bottom: 4px; color: var(--text); }
        .login-subtitle { text-align: center; color: var(--text-secondary); font-size: 14px; margin-bottom: 28px; }
        .login-form .form-group { margin-bottom: 18px; }
        .login-form label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
        .login-form input {
            width: 100%; padding: 11px 14px;
            border: 1px solid var(--border); border-radius: var(--radius);
            font-size: 15px; outline: none;
            transition: border-color 0.15s;
        }
        .login-form input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
        .login-btn {
            width: 100%; padding: 12px; border: none;
            border-radius: var(--radius); font-size: 16px; font-weight: 600;
            cursor: pointer; margin-top: 6px;
        }
        .login-btn-primary { background: var(--primary); color: #fff; }
        .login-btn-primary:hover { background: var(--primary-hover); }
        .login-error { color: var(--danger); font-size: 13px; text-align: center; margin-top: 12px; display: none; }
        .login-error.show { display: block; }
        .login-toggle { text-align: center; margin-top: 18px; font-size: 14px; color: var(--text-secondary); }
        .login-toggle a { color: var(--primary); cursor: pointer; text-decoration: none; font-weight: 500; }
        .logout-btn {
            background: none; border: 1px solid var(--border); border-radius: 20px;
            padding: 4px 14px; font-size: 13px; cursor: pointer;
            color: var(--text-secondary); transition: all 0.15s;
        }
        .logout-btn:hover { background: #fee2e2; color: var(--danger); border-color: var(--danger); }
    
        /* ========== 用户管理 ========== */
        .user-section { display: none; }
        .user-section.show { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .user-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .user-section-header h2 { font-size: 18px; font-weight: 700; }
        .count-badge { font-size: 13px; color: var(--text-secondary); background: #f1f5f9; padding: 4px 14px; border-radius: 20px; }
        .user-table-wrap { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
        .user-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .user-table thead { background: #f8fafc; }
        .user-table th { padding: 14px 16px; text-align: left; font-weight: 600; font-size: 13px; color: var(--text-secondary); border-bottom: 2px solid var(--border); }
        .user-table td { padding: 14px 16px; border-bottom: 1px solid var(--border); }
        .user-table tbody tr:last-child td { border-bottom: none; }
        .user-table tbody tr:hover td { background: #f8fafc; }
        .user-del-btn { background: none; border: 1px solid transparent; color: var(--danger); cursor: pointer; font-size: 13px; padding: 4px 12px; border-radius: 4px; }
        .user-del-btn:hover { background: #fee2e2; border-color: #fecaca; }
    
    /* ---------- 工作台 ---------- */
    .dashboard-section { display: none; }
    .dashboard-section.show { display: block; animation: dashFade 0.25s ease; }
    @keyframes dashFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .d-header { margin-bottom: 24px; }
    .d-header h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
    .d-header p { font-size: 14px; color: var(--text-secondary); }
    .d-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
    .d-stat-card { border-radius: 12px; padding: 24px; color: #fff; box-shadow: 0 4px 20px rgba(0,0,0,.1); transition: transform 0.2s; }
    .d-stat-card:hover { transform: translateY(-3px); }
    .d-stat-number { font-size: 32px; font-weight: 700; margin-bottom: 2px; line-height: 1; }
    .d-stat-label { font-size: 14px; opacity: .85; }
    .d-section-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 12px; padding-left: 2px; }
    .d-actions { display: flex; gap: 12px; margin-bottom: 28px; }
    .d-recent { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 0 16px; box-shadow: var(--shadow); }
    .d-recent-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .d-recent-item:last-child { border-bottom: none; }
    .d-recent-item .d-name { font-weight: 500; }
    .d-recent-item .d-meta { color: var(--text-secondary); font-size: 12px; }
    .d-empty-list { text-align: center; padding: 24px; color: var(--text-secondary); font-size: 14px; }
    
    /* ---------- 报检单 ---------- */
    .inspect-section { display: none; }
    .inspect-section.show { display: block; animation: fadeIn 0.2s ease; }
    .inspect-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .inspect-header h2 { font-size: 18px; font-weight: 700; }
    .inspect-search { display: flex; gap: 10px; margin-bottom: 16px; }
    .inspect-search input { flex: 1; max-width: 300px; padding: 9px 14px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; outline: none; transition: border-color 0.15s; }
    .inspect-search input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
    .inspect-table-wrap { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .inspect-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .inspect-table thead { background: #f8fafc; }
    .inspect-table th { padding: 14px 16px; text-align: left; font-weight: 600; font-size: 13px; color: var(--text-secondary); border-bottom: 2px solid var(--border); }
    .inspect-table td { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .inspect-table tbody tr:last-child td { border-bottom: none; }
    .inspect-table tbody tr:hover td { background: #f8fafc; }
    .inspect-empty { text-align: center; padding: 40px; color: var(--text-secondary); font-size: 14px; }
    
    /* ---------- 样品接收 ---------- */
    .receive-section { display: none; }
    .receive-section.show { display: block; animation: fadeIn 0.2s ease; }
   </style>
    </head>
<body>

        <!-- ========== 登录页面 ========== -->
    <div class="login-page" id="loginPage">
        <div class="login-card">
            <h1>🧪 GXD 测试系统</h1>
            <p class="login-subtitle" id="loginSubtitle">请登录以继续</p>
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="loginUsername">用户名</label>
                    <input type="text" id="loginUsername" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码" required>
                </div>
                <div class="form-group" id="confirmGroup" style="display:none">
                    <label for="loginConfirm">确认密码</label>
                    <input type="password" id="loginConfirm" placeholder="再次输入密码">
                </div>

        /* ========== Supabase 云端同步 ========== */
        var SB_URL = 'https://gdeysdxcfkhreuqmmqax.supabase.co';
        var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkZXlzZHhjZmtocmV1cW1tcWF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MTAxNzMsImV4cCI6MjA5NzA4NjE3M30.95kVJHZKaHJtuQNajBrVpdWjhQUPUc-1rpfHnHgN6lk';
        function sbReq(method, table, body) {
            var h = {};
            h['apikey'] = SB_KEY;
            h['Authorization'] = 'Bearer ' + SB_KEY;
            if (body) {
                h['Content-Type'] = 'application/json';
                h['Prefer'] = 'return=minimal';
            }
            var o = { method: method, headers: h };
            if (body) o.body = JSON.stringify(body);
            return fetch(SB_URL + '/rest/v1/' + table, o).catch(function() { return null; });

        }
        function sbSyncAll(table, data, conflict) {
            if (!data || data.length === 0) return;
            var url = SB_URL + '/rest/v1/' + table + '?on_conflict=' + (conflict || 'id');
            fetch(url, {
                method: 'POST',
                headers: {
                    'apikey': SB_KEY,
                    'Authorization': 'Bearer ' + SB_KEY,
                    'Content-Type': 'application/json',
                    'Prefer': 'resolution=merge-duplicates'

function setupLogin() {
            const loginPage = document.getElementById('loginPage');
            const loginForm = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');
            const loginToggle = document.getElementById('loginToggle');
            const loginSubtitle = document.getElementById('loginSubtitle');
            const confirmGroup = document.getElementById('confirmGroup');
            const usernameInput = document.getElementById('loginUsername');
            const passwordInput = document.getElementById('loginPassword');
            const confirmInput = document.getElementById('loginConfirm');

            loginToggle.addEventListener('click', function () {
                if (loginMode === 'login') {
                    loginMode = 'register';
                    loginBtn.textContent = '注 册';
                    loginSubtitle.textContent = '创建一个新账号';
                    loginToggle.textContent = '已有账号？点击登录';
                    confirmGroup.style.display = 'block';
                } else {
                    loginMode = 'login';
                    loginBtn.textContent = '登 录';
                    loginSubtitle.textContent = '请登录以继续';
                    loginToggle.textContent = '立即注册';
                    confirmGroup.style.display = 'none';
                }
                loginError.classList.remove('show');
            });

            loginForm.addEventListener('submit', function (e) {
                e.preventDefault();
                loginError.classList.remove('show');
                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();

                if (!username || !password) {
                    loginError.textContent = '请填写用户名和密码';
                    loginError.classList.add('show');
                    return;
                }

                if (loginMode === 'register') {
                    const confirm = confirmInput.value.trim();
                    if (password !== confirm) {
                        loginError.textContent = '两次密码输入不一致';
                        loginError.classList.add('show');
                        return;
                    }
                    if (password.length < 4) {
                        loginError.textContent = '密码长度不能少于4位';
                        loginError.classList.add('show');
                        return;
                    }
                    if (users.some(u => u.username === username)) {
                        loginError.textContent = '该用户名已被注册';
                        loginError.classList.add('show');
                        return;
                    }
                    users.push({ name: username, username, password, phone: '' });
                    saveUsers(users);
                    setCurrentUser(username);
                    loginPage.classList.add('hidden');
                    document.getElementById('userName').textContent = username;
                } else {
                    const user = users.find(u => u.username === username && u.password === password);
                    if (!user) {
                        loginError.textContent = '用户名或密码错误';
                        loginError.classList.add('show');
                        return;
                    }
                    setCurrentUser(username);
                    loginPage.classList.add('hidden');
                    document.getElementById('userName').textContent = username;
                }
                // 登录后默认显示工作台
                refreshDashboard();



                usernameInput.value = '';
                passwordInput.value = '';
                confirmInput.value = '';
            });

            document.getElementById('logoutBtn').addEventListener('click', function () {
                setCurrentUser(null);
                loginPage.classList.remove('hidden');
                document.getElementById('userName').textContent = '未登录';
                usernameInput.value = '';
                passwordInput.value = '';
                confirmInput.value = '';
                loginMode = 'login';
                loginBtn.textContent = '登 录';
                loginSubtitle.textContent = '请登录以继续';
                loginToggle.textContent = '立即注册';
                confirmGroup.style.display = 'none';
                loginError.classList.remove('show');
            });
        }

        /* ========== 报检单 ========== */

        function saveInspects(data) { localStorage.setItem('gxd_inspects', JSON.stringify(data)); sbSyncAll('inspects', data); }

        function genOrderNo() {
            var now = new Date();
            var y = now.getFullYear();
            var m = ('0' + (now.getMonth()+1)).slice(-2);
            var d = ('0' + now.getDate()).slice(-2);
            var prefix = '' + y + m + d;
            var inspects = loadInspects();
            var max = 0;
            inspects.forEach(function(item) {
                if (item.orderNo.indexOf(prefix) === 0) {
                    var num = parseInt(item.orderNo.slice(-3), 10);
                    if (num > max) max = num;
                }
            });
            return prefix + ('00' + (max + 1)).slice(-3);
        }

        function renderInspects(keyword) {

            var empty = document.getElementById('inspectEmpty');

            });
            tbody.innerHTML = h;
            tbody.querySelectorAll('.inspect-edit-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var id = parseInt(this.dataset.id, 10);
                    var list2 = loadInspects();
                    var item = list2.find(function(x) { return x.id === id; });
                    if (!item) return;
                    editingInspectId = id;
                    document.getElementById('inspectModalTitle').textContent = '✏️ 编辑报检单';
                    document.getElementById('inspectOrderNo').value = item.orderNo;
                    document.getElementById('inspectPerson').value = item.inspector;
                    document.getElementById('inspectTime').value = item.inspectTime;
                    document.getElementById('inspectProject').value = item.project;
                    document.getElementById('inspectStatus').value = item.status || '未报检';
                    document.getElementById('inspectError').classList.remove('show');
                    document.getElementById('inspectModal').classList.add('show');
                });
            });
            tbody.querySelectorAll('.inspect-del-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var id = parseInt(this.dataset.id, 10);
                    var list2 = loadInspects();
                    var idx = list2.findIndex(function(x) { return x.id === id; });
                    if (idx !== -1) list2.splice(idx, 1);
                    saveInspects(list2);
                    renderInspects(document.getElementById('inspectSearch').value.trim());
                });
            });
            tbody.querySelectorAll('.inspect-confirm-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var id = parseInt(this.dataset.id, 10);
                    var list2 = loadInspects();
                    var item = list2.find(function(x) { return x.id === id; });
                    if (!item) return;
                    item.status = '已报检';
                    saveInspects(list2);
                    var recs = loadReceives();
                    recs.push({
                        id: Date.now() + Math.floor(Math.random() * 1000),
                        orderNo: item.orderNo,
                        inspector: item.inspector,
                        inspectTime: item.inspectTime,
                        project: item.project,
                        receiver: '',
                        receiveTime: '',
                        status: '待接收'
                    });
                    saveReceives(recs);
                    renderInspects(document.getElementById('inspectSearch').value.trim());
                });
            });
        }

        
        /* ========== 样品接收 ========== */
        function loadReceives() {
            var d = localStorage.getItem('gxd_receives');
            if (d) { try { return JSON.parse(d); } catch(e) {} }
            return [];
        }
        function saveReceives(data) { localStorage.setItem('gxd_receives', JSON.stringify(data)); sbSyncAll('receives', data); }

        function renderReceives() {
            var tbody = document.getElementById('receiveTableBody');
            var empty = document.getElementById('receiveEmpty');
            var list = loadReceives();
            list.reverse();
            if (list.length === 0) {
                tbody.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';
            var h = '';
            list.forEach(function(item) {
                h += '<tr><td>' + item.orderNo + '</td><td>' + item.inspector + '</td><td>' + item.inspectTime + '</td><td>' + item.project + '</td><td>' + item.receiver + '</td><td>' + item.receiveTime + '</td><td><span style="color:#f59e0b;font-weight:500;">' + (item.status || '待接收') + '</span></td></tr>';
            });
            tbody.innerHTML = h;
        }

        function setupReceive() {
            document.querySelectorAll('.nav-item[data-filter="receive"]').forEach(function(el) {
                el.addEventListener('click', function() {
                    document.getElementById('receiveSection').classList.add('show');
                    document.getElementById('inspectSection').classList.remove('show');
                    document.getElementById('dashboardSection').classList.remove('show');
                    document.getElementById('userSection').classList.remove('show');


                    renderReceives();
                });
            });
            document.querySelectorAll('.nav-item').forEach(function(el) {
                if (el.dataset.filter !== 'receive' && el.dataset.filter !== 'inspect' && el.dataset.filter !== 'usermgr' && el.dataset.filter !== 'dashboard') {
                    el.addEventListener('click', function() {
                        document.getElementById('receiveSection').classList.remove('show');
                    });
                }
            });
        }
function setupInspect() {
            document.querySelectorAll('.nav-item[data-filter="inspect"]').forEach(function(el) {
                el.addEventListener('click', function() {
                    document.getElementById('inspectSection').classList.add('show');
                    document.getElementById('dashboardSection').classList.remove('show');
                    document.getElementById('userSection').classList.remove('show');


                    document.getElementById('receiveSection').classList.remove('show');
                    renderInspects();
                });
            });
            // 其他侧边栏隐藏报检单
            document.querySelectorAll('.nav-item').forEach(function(el) {
                if (el.dataset.filter !== 'inspect' && el.dataset.filter !== 'usermgr' && el.dataset.filter !== 'dashboard') {
                    el.addEventListener('click', function() {
                        document.getElementById('inspectSection').classList.remove('show');
                    });
                }
            });

            document.getElementById('addInspectBtn').addEventListener('click', function() {
                editingInspectId = null;
                var cur = getCurrentUser() || '未知';
                var now = new Date();
                var timeStr = now.getFullYear() + '-' + ('0'+(now.getMonth()+1)).slice(-2) + '-' + ('0'+now.getDate()).slice(-2) + ' ' + ('0'+now.getHours()).slice(-2) + ':' + ('0'+now.getMinutes()).slice(-2) + ':' + ('0'+now.getSeconds()).slice(-2);
                document.getElementById('inspectModalTitle').textContent = '＋ 新增报检单';
                document.getElementById('inspectOrderNo').value = genOrderNo();
                document.getElementById('inspectPerson').value = cur;
                document.getElementById('inspectTime').value = timeStr;
                document.getElementById('inspectProject').value = '';
                document.getElementById('inspectError').classList.remove('show');
                document.getElementById('inspectModal').classList.add('show');
            });

            function closeInspectModal() { document.getElementById('inspectModal').classList.remove('show'); }
            document.getElementById('inspectModalClose').addEventListener('click', closeInspectModal);
            document.getElementById('inspectModalCancel').addEventListener('click', closeInspectModal);
            document.getElementById('inspectModal').addEventListener('click', function(e) { if (e.target === this) closeInspectModal(); });

            document.getElementById('inspectModalSave').addEventListener('click', function() {
                var project = document.getElementById('inspectProject').value.trim();
                var err = document.getElementById('inspectError');
                if (!project) { err.textContent = '请填写报检项目'; err.classList.add('show'); return; }
                err.classList.remove('show');
                var list = loadInspects();
                if (editingInspectId) {
                    var idx = list.findIndex(function(x) { return x.id === editingInspectId; });
                    if (idx !== -1) {
                        list[idx].project = project;
                        saveInspects(list);
                    }
                } else {
                    list.push({
                        id: Date.now(),
                        orderNo: document.getElementById('inspectOrderNo').value,
                        inspector: document.getElementById('inspectPerson').value,
                        inspectTime: document.getElementById('inspectTime').value,
                        status: '未报检',
                        project: project
                    });
                    saveInspects(list);
                }
                closeInspectModal();
                renderInspects(document.getElementById('inspectSearch').value.trim());
            });

            document.getElementById('inspectSearchBtn').addEventListener('click', function() {
                renderInspects(document.getElementById('inspectSearch').value.trim());
            });
            document.getElementById('inspectSearch').addEventListener('keyup', function(e) {
                if (e.key === 'Enter') renderInspects(this.value.trim());
            });

            document.getElementById('inspectResetBtn').addEventListener('click', function() {
                document.getElementById('inspectSearch').value = '';
                renderInspects('');
            });
        }
function setupUserPage() {



            document.querySelectorAll('.nav-item[data-filter="usermgr"]').forEach(function(el) {
                el.addEventListener('click', function() {
                    document.getElementById('userSection').classList.add('show');
                    document.getElementById('dashboardSection').classList.remove('show');
                    document.getElementById('inspectSection').classList.remove('show');
                    document.getElementById('receiveSection').classList.remove('show');
                    document.querySelector('.main-content').scrollTop = 0;
                    renderUserPage();
                });
            });
            document.querySelectorAll('.nav-item').forEach(function(el) {
                if (el.dataset.filter !== 'usermgr' && el.dataset.filter !== 'dashboard') {
                    el.addEventListener('click', function() {
                        document.getElementById('dashboardSection').classList.remove('show');
                        document.getElementById('userSection').classList.remove('show');


                    });
                }
            });
            document.getElementById('openAddUserBtn').addEventListener('click', function() {
                editingUsername = null;
                document.getElementById('addUserModalTitle').textContent = '＋ 新增用户';
                document.getElementById('newUserAccount').disabled = false;
                ['newName','newUserAccount','newUserPass','newUserPhone'].forEach(function(id) {
                    document.getElementById(id).value = '';
                });
                document.getElementById('userMgrError').classList.remove('show');
                document.getElementById('addUserOverlay').classList.add('show');
            });
            function closeUM() { document.getElementById('addUserOverlay').classList.remove('show'); }
            document.getElementById('addUserClose').addEventListener('click', closeUM);
            document.getElementById('addUserCancel').addEventListener('click', closeUM);
            document.getElementById('addUserOverlay').addEventListener('click', function(e) { if (e.target === this) closeUM(); });
            document.getElementById('addUserConfirm').addEventListener('click', function() {
                var name = document.getElementById('newName').value.trim();
                var username = document.getElementById('newUserAccount').value.trim();
                var password = document.getElementById('newUserPass').value.trim();
                var phone = document.getElementById('newUserPhone').value.trim();
                var err = document.getElementById('userMgrError');
                if (!name || !username || !password) { err.textContent = '名称、账号、密码为必填项'; err.classList.add('show'); return; }
                if (password.length < 4) { err.textContent = '密码长度不能少于4位'; err.classList.add('show'); return; }
                if (!editingUsername && users.some(function(u) { return u.username === username; })) { err.textContent = '该账号已存在'; err.classList.add('show'); return; }
                err.classList.remove('show');
                if (editingUsername) {
                    var idx = users.findIndex(function(u) { return u.username === editingUsername; });
                    if (idx !== -1) {
                        users[idx].name = name;
                        users[idx].password = password;
                        users[idx].phone = phone;
                        saveUsers(users);
                        showToast('用户信息已更新');
                    }
                } else {
                    users.push({ name: name, username: username, password: password, phone: phone });
                    saveUsers(users);
                    showToast('新增用户成功：' + name);
                }
                closeUM();
                renderUserPage();
            });
        }

           script.js — GXD 测试系统 应用逻辑
           ====================================================== */

        document.addEventListener('DOMContentLoaded', function () {
            checkLogin();
            setupLogin();
            setupDashboard();
            setupUserPage();
            setupInspect();
            setupReceive();
            syncFromCloud();
                });
</script>
</body>
